<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Informe de vehículo DGT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://js.stripe.com/v3/"></script>
<style>
body { margin:0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f6f8; color: #001f3f; }
header { display:flex; align-items:center; padding: 30px 40px; background:#001f3f; color:#fff; }
header img { width:40px; height:40px; margin-right:20px; }
header h1 { font-size:1.8em; margin:0; }
header p { margin-left:auto; font-size:1em; color:#d0d7e0; }
.container { display:flex; justify-content:center; align-items:flex-start; gap:40px; padding:60px 20px; flex-wrap:wrap; }
.card { background:#fff; padding:30px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.12); width:280px; text-align:center; transition: transform 0.3s; }
.card:hover { transform: translateY(-5px); }
.card b { display:block; font-size:1.4em; margin:15px 0; color:#001f3f; }
button.pay { background: linear-gradient(135deg,#2ecc71,#27ae60); color:white; border:none; padding:16px 0; width:100%; font-size:1.1em; border-radius:10px; cursor:pointer; transition: all 0.3s; }
button.pay:hover { background: linear-gradient(135deg,#27ae60,#219150); }
.confirmation { display:none; text-align:center; font-size:1.25em; margin-top:50px; color:#001f3f; }
</style>
</head>
<body>

<header>
<img src="https://img.icons8.com/ios-filled/50/ffffff/car.png" alt="Icono vehículo">
<h1>Informe de vehículo DGT</h1>
<p>Evita sorpresas al comprar un vehículo de segunda mano</p>
</header>

<div class="container">
  <div class="card">
    <b>Informe Vehículo Rápido</b>
    <p>Entrega en 24 h</p>
    <b>25 €</b>
    <button class="pay" id="btn-rapido">Pagar y solicitar</button>
  </div>
  <div class="card">
    <b>Informe Vehículo Urgente</b>
    <p>Entrega inmediata</p>
    <b>29 €</b>
    <button class="pay" id="btn-urgente">Pagar y solicitar</button>
  </div>
</div>

<div id="confirmation" class="confirmation">
  ¡Gracias! Tu pago se ha completado y tu informe será enviado a tu email.
</div>

<script>
// Clave pública de prueba que proporcionaste
const stripe = Stripe('pk_test_51TAWruFT3616A0OSYp3dmLvifQVdW1gI52pvhERfyyJIMrFIQzlSQoDy2EEmH5YVuEysfc5PCmSy6k1HQAKUzhPF00FaT66JuS');

document.getElementById('btn-rapido').addEventListener('click', function() {
    stripe.redirectToCheckout({
        lineItems: [{ price: 'price_1TAXN1FT3616A0OSDVZwiAEO', quantity: 1 }],
        mode: 'payment',
        successUrl: window.location.href + '?success=true',
        cancelUrl: window.location.href
    });
});

document.getElementById('btn-urgente').addEventListener('click', function() {
    stripe.redirectToCheckout({
        lineItems: [{ price: 'price_1TAXPoFT3616A0OSZBhv1HWI', quantity: 1 }],
        mode: 'payment',
        successUrl: window.location.href + '?success=true',
        cancelUrl: window.location.href
    });
});

// Mostrar confirmación tras pago
if(window.location.search.includes('success=true')) {
    document.querySelector('.container').style.display = 'none';
    document.getElementById('confirmation').style.display = 'block';
}
</script>

</body>
</html>
