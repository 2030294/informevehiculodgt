<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprobar vehículo por matrícula | InformeVehículoDGT</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f4f4f4;color:#333;}
.container{max-width:900px;margin:auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h1,h2{color:#003366;text-align:center;}
p,li{margin:10px 0;line-height:1.5;}
ul{margin-left:20px;}
footer{text-align:center;color:#666;margin-top:40px;padding-bottom:40px;}
</style>
<script>
const stripeURL="https://buy.stripe.com/fZubJ1ftv6IR3Qt6WigrS02";
function goToStripe(){let m=document.getElementById("matricula").value.trim();let e=document.getElementById("email").value.trim();if(!m||!e){alert("Introduce matrícula y email");return;}window.location.href=stripeURL+"?prefilled_email="+encodeURIComponent(e)+"&client_reference_id="+encodeURIComponent(m)+"&locale=es";}
</script>
</head>
<body>
<div class="container">
<h1>Comprobar vehículo por matrícula</h1>
<p>Introduce la matrícula de cualquier vehículo y obtén su informe completo de la DGT en minutos:</p>
<div style="text-align:center;margin-top:20px;">
<input type="text" id="matricula" placeholder="Matrícula del vehículo" style="padding:12px;width:80%;border:1px solid #003366;border-radius:6px;text-align:center;margin-bottom:15px;">
<input type="email" id="email" placeholder="Correo electrónico" style="padding:12px;width:80%;border:1px solid #003366;border-radius:6px;text-align:center;margin-bottom:15px;">
<br>
<button style="background:#ff6600;color:#fff;padding:16px;border:none;border-radius:8px;font-weight:bold;width:80%;cursor:pointer;" onclick="goToStripe()">🚀 Obtener informe por 24,99 €</button>
</div>
</div>
<footer>
&copy; 2026 InformeVehículoDGT - Todos los derechos reservados
</footer>
</body>
</html>
